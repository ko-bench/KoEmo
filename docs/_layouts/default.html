<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 40px;
      line-height: 1.7;
      color: #333;
      background: #fff;
    }
    h1 { font-size: 1.8em; border-bottom: 2px solid #4472C4; padding-bottom: 10px; }
    h2 { font-size: 1.4em; margin-top: 2em; color: #4472C4; }
    h3 { font-size: 1.15em; margin-top: 1.5em; }
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
      font-size: 0.95em;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px 12px;
      text-align: left;
    }
    td:first-child, td:nth-child(2), td:nth-child(4) {
      white-space: nowrap;
    }
    td:nth-child(2) {
      min-width: 5.5em;
    }
    th { background: #4472C4; color: #fff; }
    tr:nth-child(even) { background: #f8f9fa; }
    code {
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.9em;
    }
    pre {
      background: #f6f8fa;
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
    }
    hr { border: none; border-top: 1px solid #ddd; margin: 2em 0; }
    ul, ol { padding-left: 1.5em; }
    li { margin-bottom: 0.3em; }
    strong { color: #222; }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
